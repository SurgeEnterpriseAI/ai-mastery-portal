name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build
        # dummy URL: force-dynamic pages don't query at build; this only satisfies client construction
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
        run: npm run build
